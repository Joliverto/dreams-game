<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Captura de Leads - Dreams</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --dreams-purple: #6A0DAD;
            --dreams-cyan: #00E5FF;
            --dreams-orange: #FF5E3A;
            --water: #72D6EE;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Press Start 2P', cursive;
            touch-action: none;
            padding:
                env(safe-area-inset-top, 0px)
                env(safe-area-inset-right, 0px)
                env(safe-area-inset-bottom, 0px)
                env(safe-area-inset-left, 0px);
        }

        #game-container {
            position: relative;
            width: min(
                100%,
                800px,
                calc((100dvh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px)) * 2)
            );
            aspect-ratio: 2 / 1;
            background-color: var(--water);
            box-shadow: 0 0 20px var(--dreams-purple);
            border: 4px solid var(--dreams-cyan);
            border-radius: 8px;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: auto;
        }

        /* Interface do Usuário (UI) */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .hud-text {
            color: white;
            text-shadow: 2px 2px 0 var(--dreams-purple);
            font-size: clamp(8px, 1.8vw, 14px);
        }

        #hearts {
            color: #ff3366;
            font-size: clamp(12px, 2.5vw, 18px);
            text-shadow: 2px 2px 0 #880000;
        }

        /* Telas de Início e Game Over */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(106, 13, 173, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: all;
            color: white;
        }

        .overlay h1 {
            color: var(--dreams-cyan);
            text-shadow: 3px 3px 0 #000;
            margin-bottom: 20px;
            font-size: clamp(14px, 3vw, 24px);
            line-height: 1.5;
        }

        .overlay p {
            font-size: clamp(7px, 1.2vw, 10px);
            margin-bottom: 20px;
            color: #ddd;
        }

        button {
            background-color: var(--dreams-orange);
            color: white;
            font-family: inherit;
            border: 2px solid white;
            padding: clamp(10px, 2vw, 15px) clamp(12px, 2.5vw, 20px);
            font-size: clamp(9px, 1.5vw, 12px);
            cursor: pointer;
            box-shadow: 4px 4px 0 #000;
            transition: transform 0.1s;
            min-width: 44px;
            min-height: 44px;
        }

        button:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0 #000;
        }

        .hidden { display: none !important; }

        /* Tela de aviso de rotação */
        #rotate-message {
            display: none;
            position: fixed;
            inset: 0;
            background: #111;
            color: white;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            z-index: 9999;
            font-family: 'Press Start 2P', cursive;
            font-size: 11px;
            line-height: 2;
            padding: 30px;
            gap: 15px;
        }

        #rotate-message .rotate-icon {
            font-size: 48px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0%   { transform: rotate(0deg); }
            25%  { transform: rotate(90deg); }
            50%  { transform: rotate(90deg); }
            75%  { transform: rotate(90deg); }
            100% { transform: rotate(90deg); }
        }

        @media (orientation: portrait) and (max-width: 1024px) {
            #rotate-message { display: flex; }
        }
    </style>
</head>
<body>

    <div id="rotate-message">
        <span class="rotate-icon">&#x21BB;</span>
        <p>Gire o celular<br>para modo<br>paisagem</p>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div id="ui-layer">
            <div class="hud-text">LEADS: <span id="scoreDisplay">0</span></div>
            <div id="hearts">♥♥♥</div>
        </div>

        <div id="startScreen" class="overlay">
            <h1>CAPTURA DE<br>LEADS</h1>
            <p>Páscoa Dreams no Parque Aquático!</p>
            <p>Toque na tela ou aperte ESPAÇO para pular.</p>
            <button onclick="startGame()">INICIAR EVENTO</button>
        </div>

        <div id="gameOverScreen" class="overlay hidden">
            <h1>FIM DO EXPEDIENTE</h1>
            <p>Você capturou <span id="finalScore">0</span> Leads!</p>
            <button onclick="resetGame()">TENTAR NOVAMENTE</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Escala o canvas pelo devicePixelRatio para telas de alta resolução (cap em 2 para não sobrecarregar GPU mobile)
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = 800 * dpr;
        canvas.height = 400 * dpr;
        ctx.scale(dpr, dpr);

        // Carregamento de Assets (Imagens)
        const images = {};
        const assets = {
            player: 'assets/chefe.png',
            lead: 'assets/lead.png',
            obstacle: 'assets/obstaculo.png',
            aerial: 'assets/obstaculo-aereo.png',
            bg: 'assets/fundo.png',
            ground: 'assets/chao.png'
        };

        for (let key in assets) {
            images[key] = new Image();
            images[key].src = assets[key];
        }

        // Efeitos sonoros
        const sfxLead = new Audio('assets/sound/lead-reclaim.mp3');
        sfxLead.volume = 0.6;

        // Soundtrack
        const soundtrack = new Audio('assets/sound/sountrack-game.mp3');
        soundtrack.loop = true;
        soundtrack.volume = 0.4;

        // Inicia a música na primeira interação do usuário (política de autoplay dos browsers)
        let musicStarted = false;
        function tryStartMusic() {
            if (!musicStarted) {
                musicStarted = true;
                soundtrack.play().catch(() => {});
            }
        }
        document.addEventListener('pointerdown', tryStartMusic, { once: true });
        document.addEventListener('keydown', tryStartMusic, { once: true });

        // Variáveis Globais do Jogo
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let frames = 0;
        let gameSpeed = 5;

        // Delta time — garante velocidade consistente independente do FPS
        let lastTime = 0;
        let gameTime = 0;
        let obstacleSpawnTimer = 0;
        let leadSpawnTimer = 0;
        let aerialSpawnTimer = 0;

        // Arrays de entidades
        let obstacles = [];
        let leads = [];
        let aerialObstacles = [];

        // Dimensões lógicas do jogo (independente do DPR)
        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 400;

        // Chão do parque aquático
        const groundHeight = 80;
        const groundY = GAME_HEIGHT - groundHeight;

        // Personagem (A Chefe)
        const player = {
            x: 50,
            y: 0,
            width: 65,
            height: 80,
            dy: 0,
            gravityNormal: 0.25,   // gravidade normal (descida / soltar pulo)
            gravityHold: 0.22,     // gravidade reduzida ao segurar (pulo mais alto)
            jumpPower: -9.25,
            grounded: false,
            holdingJump: false,    // true enquanto a tecla/touch estiver pressionada
            invulnerable: 0, // Timer de invencibilidade ao tomar dano
            
            draw() {
                // Efeito de piscar quando toma dano
                if (this.invulnerable > 0 && frames % 10 < 5) return;

                if (images.player.complete && images.player.naturalWidth > 0) {
                    ctx.drawImage(images.player, this.x, this.y, this.width, this.height);
                } else {
                    // Fallback se a imagem não carregar (Retângulo roxo)
                    ctx.fillStyle = '#6A0DAD';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                }
                // DEBUG: hitbox do personagem
                ctx.save();
                ctx.strokeStyle = 'rgba(0, 255, 0, 0.9)';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.width, this.height);
                ctx.restore();
            },
            
            update(delta) {
                // Gravidade variável: reduzida ao segurar pulo subindo (pulo alto), normal caso contrário (pulo curto)
                const gravity = (this.holdingJump && this.dy < 0) ? this.gravityHold : this.gravityNormal;
                this.y += this.dy * delta;
                if (this.y + this.height < groundY) {
                    this.dy += gravity * delta;
                    this.grounded = false;
                } else {
                    this.dy = 0;
                    this.y = groundY - this.height;
                    this.grounded = true;
                    this.holdingJump = false;
                }

                if (this.invulnerable > 0) this.invulnerable -= delta;
                
                this.draw();
            },
            
            jump() {
                if (this.grounded) {
                    this.dy = this.jumpPower;
                    this.holdingJump = true;
                }
            },

            // Chamado ao soltar a tecla/touch: corta o pulo se ainda estiver subindo
            releaseJump() {
                this.holdingJump = false;
                if (this.dy < -7.5) this.dy = -7.5;
            }
        };

        // Classe para Obstáculos
        class Obstacle {
            constructor() {
                this.width = 60 + Math.random() * 20;
                this.height = 100 + Math.random() * 40;
                this.x = GAME_WIDTH;
                this.y = groundY - this.height;
                this.markedForDeletion = false;

                // ── Hitbox independente ──────────────────────────────────────
                // Altere só estes dois valores; a imagem não muda.
                // Reduzir hitWidth encolhe igualmente nos dois lados (esquerdo e direito).
                // Reduzir hitHeight encolhe igualmente em cima e em baixo.
                this.hitWidth  = this.width  - 40; // largura da hitbox
                this.hitHeight = this.height - 10; // altura da hitbox
                // ─────────────────────────────────────────────────────────────

                // Offsets calculados automaticamente para centralizar a hitbox na imagem
                this.hitOffsetX = (this.width  - this.hitWidth)  / 2;
                this.hitOffsetY = (this.height - this.hitHeight) / 2;
            }
            update(delta) {
                this.x -= gameSpeed * delta;
                if (this.x + this.width < 0) this.markedForDeletion = true;
                this.draw();
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 18;
                ctx.shadowColor = '#ff0044';
                if (images.obstacle.complete && images.obstacle.naturalWidth > 0) {
                    ctx.drawImage(images.obstacle, this.x, this.y, this.width, this.height);
                } else {
                    ctx.fillStyle = '#ff0044';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                }
                // DEBUG: hitbox do obstáculo
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(255, 0, 0, 0.9)';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x + this.hitOffsetX, this.y + this.hitOffsetY, this.hitWidth, this.hitHeight);
                ctx.restore();
            }
        }

        // Classe para os LEADS (Colecionáveis)
        class Lead {
            constructor() {
                this.width = 30;
                this.height = 30;
                this.x = GAME_WIDTH + 50;
                // Flutua em alturas diferentes
                this.y = groundY - 80 - Math.random() * 100;
                this.markedForDeletion = false;
                this.angle = 0;
            }
            update(delta) {
                this.x -= gameSpeed * delta;
                // Efeito de flutuação (seno)
                this.y += Math.sin(this.angle) * 1.5 * delta;
                this.angle += 0.1 * delta;

                if (this.x + this.width < 0) this.markedForDeletion = true;
                this.draw();
            }
            draw() {
                // Efeito de brilho
                ctx.save();
                ctx.globalAlpha = 0.7 + Math.abs(Math.sin(frames * 0.1)) * 0.3;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#FF5E3A';

                if (images.lead.complete && images.lead.naturalWidth > 0) {
                    ctx.drawImage(images.lead, this.x, this.y, this.width, this.height);
                } else {
                    // Fallback Lead (Círculo Laranja/Amarelo)
                    ctx.fillStyle = '#FF5E3A';
                    ctx.beginPath();
                    ctx.arc(this.x + this.width/2, this.y + this.height/2, this.width/2, 0, Math.PI * 2);
                    ctx.fill();
                }
                // DEBUG: hitbox do lead
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
                ctx.strokeStyle = 'rgba(0, 200, 255, 0.9)';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.width, this.height);
                ctx.restore();
            }
        }

        // Classe para Obstáculos Aéreos
        class AerialObstacle {
            constructor() {
                // Tamanho visual do sprite
                this.width  = 50;
                this.height = 50;
                // Surge do lado direito, fora da tela
                this.x = GAME_WIDTH + 50;
                // Voa acima das árvores — terço superior da tela
                this.baseY = 30 + Math.random() * 100;
                this.y = this.baseY;
                this.angle = Math.random() * Math.PI * 2; // fase aleatória do seno
                this.markedForDeletion = false;

                // Hitbox mesmo tamanho do lead (30x30), centralizada no sprite
                this.hitWidth  = 30;
                this.hitHeight = 30;
                this.hitOffsetX = (this.width  - this.hitWidth)  / 2;
                this.hitOffsetY = (this.height - this.hitHeight) / 2;
            }
            update(delta) {
                // Move da direita para a esquerda mais rápido que o scroll do cenário (sentido oposto ao personagem)
                this.x -= gameSpeed * 1.5 * delta;
                // Movimento vertical suave em ondas (efeito de voo)
                this.angle += 0.07 * delta;
                this.y = this.baseY + Math.sin(this.angle) * 18;

                if (this.x + this.width < 0) this.markedForDeletion = true;
                this.draw();
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ff6600';
                if (images.aerial.complete && images.aerial.naturalWidth > 0) {
                    ctx.drawImage(images.aerial, this.x, this.y, this.width, this.height);
                } else {
                    // Fallback: losango laranja
                    const cx = this.x + this.width / 2;
                    const cy = this.y + this.height / 2;
                    ctx.fillStyle = '#ff6600';
                    ctx.beginPath();
                    ctx.moveTo(cx, cy - this.height / 2);
                    ctx.lineTo(cx + this.width / 2, cy);
                    ctx.lineTo(cx, cy + this.height / 2);
                    ctx.lineTo(cx - this.width / 2, cy);
                    ctx.closePath();
                    ctx.fill();
                }
                // DEBUG: hitbox do obstáculo aéreo
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(255, 150, 0, 0.9)';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x + this.hitOffsetX, this.y + this.hitOffsetY, this.hitWidth, this.hitHeight);
                ctx.restore();
            }
        }

        // Cenário (Fundo animado)
        let bgX = 0;
        let groundX = 0;
        function drawBackground(delta) {
            ctx.fillStyle = '#72D6EE'; // Cor da água do parque
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            if (images.bg.complete && images.bg.naturalWidth > 0) {
                // Efeito Parallax simples
                bgX -= gameSpeed * 0.5 * delta;
                if (bgX <= -GAME_WIDTH) bgX = 0;
                ctx.drawImage(images.bg, bgX, 0, GAME_WIDTH, GAME_HEIGHT);
                ctx.drawImage(images.bg, bgX + GAME_WIDTH, 0, GAME_WIDTH, GAME_HEIGHT);
            }

            // Desenha o chão com movimento (mesma velocidade dos obstáculos)
            groundX -= gameSpeed * delta;
            if (groundX <= -GAME_WIDTH) groundX = 0;
            if (images.ground.complete && images.ground.naturalWidth > 0) {
                const srcY = Math.floor(images.ground.naturalHeight * 0.83);
                const srcH = images.ground.naturalHeight - srcY;
                ctx.drawImage(images.ground, 0, srcY, images.ground.naturalWidth, srcH, groundX, groundY, GAME_WIDTH, groundHeight);
                ctx.drawImage(images.ground, 0, srcY, images.ground.naturalWidth, srcH, groundX + GAME_WIDTH, groundY, GAME_WIDTH, groundHeight);
            } else {
                ctx.fillStyle = '#00E5FF';
                ctx.fillRect(0, groundY, GAME_WIDTH, groundHeight);
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, groundY, GAME_WIDTH, 5);
            }
        }

        // Detector de Colisão
        function checkCollision(rect1, rect2) {
            return (
                rect1.x < rect2.x + rect2.width &&
                rect1.x + rect1.width > rect2.x &&
                rect1.y < rect2.y + rect2.height &&
                rect1.y + rect1.height > rect2.y
            );
        }

        // Gerenciador do Jogo
        function handleGameObjects(delta) {
            // Spawn Obstáculos (baseado em tempo, não em frames)
            obstacleSpawnTimer += delta;
            if (obstacleSpawnTimer >= 150) {
                if (Math.random() > 0.3) obstacles.push(new Obstacle());
                obstacleSpawnTimer = 0;
            }

            // Spawn Leads (baseado em tempo, não em frames)
            leadSpawnTimer += delta;
            if (leadSpawnTimer >= 160) {
                if (Math.random() > 0.4) leads.push(new Lead());
                leadSpawnTimer = 0;
            }

            // Spawn Obstáculos Aéreos — só aparecem após 12 segundos de jogo
            if (gameTime >= 720) {
                aerialSpawnTimer += delta;
                if (aerialSpawnTimer >= 220) {
                    if (Math.random() > 0.45) aerialObstacles.push(new AerialObstacle());
                    aerialSpawnTimer = 0;
                }
            }

            // Atualiza Obstáculos e checa colisão
            obstacles.forEach((obs, index) => {
                obs.update(delta);
                
                // Colisão com obstáculo (usa hitbox independente)
                const obsHit = { x: obs.x + obs.hitOffsetX, y: obs.y + obs.hitOffsetY, width: obs.hitWidth, height: obs.hitHeight };
                if (checkCollision(player, obsHit)) {
                    if (player.invulnerable <= 0) {
                        lives--;
                        updateHearts();
                        player.invulnerable = 60; // 1 segundo de invencibilidade (60 frames)
                        
                        if (lives <= 0) {
                            endGame();
                        }
                    }
                }
            });

            // Atualiza Leads e checa captura
            leads.forEach((lead, index) => {
                lead.update(delta);
                
                // Pegou o Lead!
                if (checkCollision(player, lead)) {
                    score++;
                    document.getElementById('scoreDisplay').innerText = score;
                    lead.markedForDeletion = true;
                    sfxLead.currentTime = 0;
                    sfxLead.play().catch(() => {});
                    

                }
            });

            // Atualiza Obstáculos Aéreos e checa colisão
            aerialObstacles.forEach(aer => {
                aer.update(delta);

                const aerHit = { x: aer.x + aer.hitOffsetX, y: aer.y + aer.hitOffsetY, width: aer.hitWidth, height: aer.hitHeight };
                if (checkCollision(player, aerHit)) {
                    if (player.invulnerable <= 0) {
                        lives--;
                        updateHearts();
                        player.invulnerable = 60;
                        if (lives <= 0) endGame();
                    }
                }
            });

            // Remove objetos que saíram da tela ou foram pegos
            obstacles = obstacles.filter(obs => !obs.markedForDeletion);
            leads = leads.filter(lead => !lead.markedForDeletion);
            aerialObstacles = aerialObstacles.filter(aer => !aer.markedForDeletion);
        }

        function updateHearts() {
            let heartsStr = '';
            for(let i=0; i<lives; i++) heartsStr += '♥';
            for(let i=lives; i<3; i++) heartsStr += '♡';
            document.getElementById('hearts').innerText = heartsStr;
        }

        // Loop Principal
        function animate(timestamp) {
            if (!gameRunning) return;

            // Calcula delta normalizado para 60fps (cap em 3x para evitar saltos após aba em background)
            if (lastTime === 0) lastTime = timestamp;
            const delta = Math.min((timestamp - lastTime) / (1000 / 60), 3);
            lastTime = timestamp;

            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // Velocidade aumenta progressivamente: 4 no início, 7 após 60 segundos (~3600 unidades de tempo)
            gameTime += delta;
            gameSpeed = 6 + Math.min(gameTime / 3600, 1) * 3;

            drawBackground(delta);
            handleGameObjects(delta);
            player.update(delta);

            frames++;
            requestAnimationFrame(animate);
        }

        // Controles do Jogo
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            resetVariables();
            gameRunning = true;
            if (!musicStarted) {
                musicStarted = true;
            }
            if (soundtrack.paused) {
                soundtrack.currentTime = 0;
                soundtrack.play().catch(() => {});
            }
            requestAnimationFrame(animate);
        }

        function resetVariables() {
            player.y = groundY - player.height;
            player.dy = 0;
            player.holdingJump = false;
            player.invulnerable = 0;
            obstacles = [];
            leads = [];
            aerialObstacles = [];
            score = 0;
            lives = 3;
            frames = 0;
            gameSpeed = 6;
            bgX = 0;
            groundX = 0;
            document.getElementById('scoreDisplay').innerText = score;
            updateHearts();
            gameTime = 0;
            lastTime = 0;
            obstacleSpawnTimer = 0;
            leadSpawnTimer = 0;
            aerialSpawnTimer = 0;
        }

        function endGame() {
            gameRunning = false;
            soundtrack.pause();
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('finalScore').innerText = score;
        }

        function resetGame() {
            startGame();
        }

        // Eventos de Pulo (Touch para celular, Espaço/Seta pra cima para PC)
        window.addEventListener('keydown', (e) => {
            if ((e.code === 'Space' || e.code === 'ArrowUp') && gameRunning && !e.repeat) {
                player.jump();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                player.releaseJump();
            }
        });

        window.addEventListener('touchstart', (e) => {
            // Permite que toques em botões gerem o evento click normalmente
            if (e.target.closest('button')) return;
            e.preventDefault();
            if (gameRunning) {
                player.jump();
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            if (e.target.closest('button')) return;
            e.preventDefault();
            player.releaseJump();
        }, { passive: false });

        // Desenha a tela inicial (Mesmo antes de dar play)
        drawBackground();
        player.draw();

    </script>
</body>
</html>
